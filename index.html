<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>אישורי הגעה – צופיה אסתר</title>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script>
    function handleSubmit(e) {
      var name   = document.getElementById("fn").value.trim();
      var attend = document.querySelector('input[name="entry.2037233360"]:checked');
      var count  = document.getElementById("fc").value;

      if (!name) {
        showErr("אנא מלאו את השם המלא");
        e.preventDefault(); return;
      }
      if (!attend) {
        showErr("אנא בחרו האם תגיעו");
        e.preventDefault(); return;
      }
      if (attend.value !== 'לא' && !count) {
        showErr("אנא מלאו את מספר המגיעים");
        e.preventDefault(); return;
      }

      var btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "...שולח";
      document.getElementById("form-msg").style.display = "none";

      setTimeout(function() {
        document.getElementById("thank-you-banner").classList.add("show");
        document.getElementById("rsvp-form").reset();
        btn.disabled = false;
        btn.textContent = "שלחו אישור הגעה ✦";
      }, 2000);
    }
    function showErr(msg) {
      var el = document.getElementById("form-msg");
      el.textContent = msg; el.className = "error"; el.style.display = "block";
      el.scrollIntoView({behavior:"smooth", block:"center"});
    }
    function closeBanner() {
      document.getElementById("thank-you-banner").classList.remove("show");
    }
  </script>
  <style>
    :root{--rose:#7B2F46;--rose-mid:#A84A63;--rose-light:#C97A8E;--peach:#E9A99A;--blush:#F2C4BC;--sage:#9EB09A;--cream:#FBF8F3;--parch:#F6EFE4;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--cream);font-family:"Heebo",sans-serif;color:var(--rose);direction:rtl;min-height:100vh;overflow-x:hidden;}
    .page{max-width:680px;margin:0 auto;padding:0 16px 64px;}
    .floral{width:100%;display:block;pointer-events:none;}
    .photo-wrap{border:1.5px solid #E8D5CE;border-radius:6px;overflow:hidden;box-shadow:0 8px 40px rgba(122,47,70,.12);animation:up .8s ease both;}
    .photo-wrap img{width:100%;display:block;}
    @keyframes up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .gap{height:36px;}
    .rsvp-card{border:1.5px solid #E8D5CE;border-radius:6px;overflow:hidden;box-shadow:0 8px 40px rgba(122,47,70,.10);animation:up .9s .15s ease both;}
    .rsvp-head{background:linear-gradient(135deg,var(--rose),var(--rose-mid));padding:26px 32px;text-align:center;}
    .rsvp-head h2{font-family:"Frank Ruhl Libre",serif;font-size:2rem;font-weight:700;color:#fff;letter-spacing:.03em;}
    .rsvp-head p{color:rgba(255,255,255,.8);font-size:.92rem;margin-top:6px;}
    .form-body{padding:32px 36px 36px;background:var(--parch);}
    .fg{margin-bottom:22px;}
    .fg label{display:block;font-size:.92rem;font-weight:600;color:var(--rose);margin-bottom:8px;}
    .fg label .r{color:var(--rose-light);font-weight:400;}
    .fg input[type=text],.fg input[type=number]{width:100%;border:1.5px solid #DFC8CA;border-radius:6px;padding:12px 16px;font-family:"Heebo",sans-serif;font-size:1rem;color:var(--rose);background:#fff;outline:none;direction:rtl;transition:border-color .2s,box-shadow .2s;}
    .fg input:focus{border-color:var(--rose-mid);box-shadow:0 0 0 3px rgba(168,74,99,.12);}
    .rg{display:flex;gap:10px;flex-wrap:wrap;}
    .rb{flex:1;min-width:80px;}
    .rb input[type=radio]{display:none;}
    .rb label{display:flex;align-items:center;justify-content:center;padding:11px 8px;border:1.5px solid #DFC8CA;border-radius:8px;background:#fff;font-size:.97rem;font-weight:500;color:var(--rose);cursor:pointer;transition:all .2s;text-align:center;user-select:none;}
    .rb input[type=radio]:checked+label{background:var(--rose);border-color:var(--rose);color:#fff;box-shadow:0 3px 12px rgba(122,47,70,.25);}
    .rb label:hover{border-color:var(--rose-mid);background:#FDF2F4;}
    .sbtn{width:100%;padding:15px;background:linear-gradient(135deg,var(--rose),var(--rose-mid));color:#fff;border:none;border-radius:8px;font-family:"Frank Ruhl Libre",serif;font-size:1.2rem;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:opacity .2s,transform .15s;margin-top:8px;}
    .sbtn:hover{opacity:.9;transform:translateY(-1px);}
    .sbtn:disabled{opacity:.6;cursor:default;}
    #form-msg{display:none;text-align:center;padding:22px 20px;border-radius:6px;font-family:"Frank Ruhl Libre",serif;font-size:1.1rem;font-weight:500;margin-top:16px;}
    #form-msg.success{background:#EDF7EC;color:#2E7D32;border:1.5px solid #A5D6A7;}
    #form-msg.error{background:#FDF2F4;color:var(--rose);border:1.5px solid var(--blush);}
    .footer{text-align:center;margin-top:40px;font-size:.82rem;color:var(--rose-light);}

    /* Thank you banner */
    #thank-you-banner {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(123,47,70,0.55);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn .4s ease;
    }
    #thank-you-banner.show { display: flex; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .ty-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 36px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 80px rgba(122,47,70,0.25);
      animation: popUp .45s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popUp { from{opacity:0;transform:scale(.8) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .ty-flowers { font-size: 2.8rem; margin-bottom: 12px; }
    .ty-card h3 {
      font-family: "Frank Ruhl Libre", serif;
      font-size: 1.9rem;
      font-weight: 900;
      color: var(--rose);
      margin-bottom: 12px;
      line-height: 1.25;
    }
    .ty-card p {
      font-size: 1.05rem;
      color: var(--rose-light);
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .ty-close {
      background: linear-gradient(135deg, var(--rose), var(--rose-mid));
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px 36px;
      font-family: "Frank Ruhl Libre", serif;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }
    .ty-close:hover { opacity:.9; transform:translateY(-1px); }
    @media(max-width:500px){.form-body{padding:22px 18px 28px;}.rsvp-head{padding:20px 18px;}.rsvp-head h2{font-size:1.55rem;}}
  </style>
</head>
